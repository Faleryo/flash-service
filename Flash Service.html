<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flash Service — Hi-Fi One-Pager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Boldonse&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1612; font-family: 'Geist', system-ui, sans-serif; min-height: 100vh; }
  #root { min-height: 100vh; }

  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
  input[type="range"]::-webkit-slider-runnable-track { height: 3px; background: rgba(253,252,247,0.12); border-radius: 99px; }
  input[type="range"]::-moz-range-track { height: 3px; background: rgba(253,252,247,0.12); border-radius: 99px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #f5a623; border-radius: 99px; margin-top: -6.5px; border: 3px solid #0a0a0a; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  input[type="range"]::-moz-range-thumb { height: 16px; width: 16px; background: #f5a623; border-radius: 99px; border: 3px solid #0a0a0a; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

  /* Hide scrollbar on testimonial scroller but keep scrollable */
  ::-webkit-scrollbar { height: 0; width: 0; }

  /* Page wrapper for desktop preview */
  .page-frame {
    max-width: 430px;
    margin: 0 auto;
    background: #0a0a0a;
    box-shadow: 0 0 0 1px rgba(253,252,247,0.06);
    min-height: 100vh;
    position: relative;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="full-page.jsx"></script>

<script type="text/babel">
const App = () => (
  <div className="page-frame">
    <FullPage />
  </div>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
